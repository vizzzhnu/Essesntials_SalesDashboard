<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>M.P. Hoseries – Costing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:13px;background:#eef2f7}

/* ── Tab Bar ── */
.tab-bar{background:#fff;border-bottom:1.5px solid #f1f3f5;display:flex;align-items:stretch;padding:0 20px;height:54px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.05);overflow-x:auto;gap:0}
.tab-brand{display:flex;align-items:center;gap:10px;padding-right:18px;border-right:1.5px solid #f1f3f5;margin-right:6px;flex-shrink:0}
.tab-brand-icon{width:33px;height:33px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:900;letter-spacing:.5px;flex-shrink:0}
.tab-brand-text{display:flex;flex-direction:column;gap:1px}
.tab-brand-name{font-size:12.5px;font-weight:800;color:#1e1b4b;letter-spacing:.2px;line-height:1}
.tab-brand-sub{font-size:9px;color:#a0aec0;font-weight:500;letter-spacing:.4px;line-height:1}
.tab-divider{width:1.5px;background:#f1f3f5;margin:10px 10px;align-self:stretch;flex-shrink:0}
.nav-group-label{font-size:9px;font-weight:700;color:#cbd5e1;text-transform:uppercase;letter-spacing:1.2px;display:flex;align-items:center;padding:0 4px;flex-shrink:0;align-self:center}
.tb{padding:0 13px;border:none;border-radius:0;cursor:pointer;font-size:11.5px;font-weight:600;background:transparent;color:#64748b;transition:color .15s,background .15s;white-space:nowrap;letter-spacing:.2px;border-bottom:2.5px solid transparent;display:flex;align-items:center;gap:5px;flex-shrink:0}
.tb:hover{color:#374151;background:#f8fafc}
.tb.act{color:#4f46e5;border-bottom-color:#4f46e5;font-weight:700;background:transparent;box-shadow:none}
.tb-sum{color:#7c3aed!important}.tb-sum.act{color:#6d28d9!important;border-bottom-color:#7c3aed!important}

/* ── Tab Panel ── */
.tp{display:none;padding:16px}.tp.act{display:block}

/* ── Topbar ── */
.topbar{background:linear-gradient(135deg,#1e3a8a 0%,#4f46e5 60%,#7c3aed 100%);border-radius:14px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;box-shadow:0 6px 24px rgba(79,70,229,0.25)}
.topbar-left .ttl{font-size:15px;font-weight:800;color:#fff;letter-spacing:.3px}
.topbar-left .sub{font-size:11px;color:rgba(255,255,255,0.65);margin-top:3px}
.topbar-left .sub b{color:#fde68a}.topbar-left .sub .o{color:#fdba74}
.tbr{display:flex;align-items:center;gap:8px;flex-wrap:wrap}

/* ── Badges ── */
.badge{font-size:10px;padding:3px 12px;border-radius:999px;font-weight:700;color:#fff;letter-spacing:.3px}
.badge.idle{background:rgba(255,255,255,0.2)}
.badge.loading{background:#f59e0b;animation:pl 1s infinite}
.badge.connected{background:#10b981}
.badge.local{background:#f97316}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.5}}
.uns{color:#fde68a;font-size:10px;font-weight:700;animation:pl 1s infinite}

/* ── Buttons ── */
.bsv{background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:700;font-size:11px;cursor:pointer;box-shadow:0 2px 8px rgba(16,185,129,0.35);transition:.15s}
.bsv:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(16,185,129,0.4)}.bsv:disabled{background:linear-gradient(135deg,#9ca3af,#6b7280);box-shadow:none;cursor:not-allowed;transform:none}
.bexp{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff;border:none;padding:7px 12px;border-radius:8px;font-weight:700;font-size:10px;cursor:pointer;transition:.15s}
.bexp:hover{transform:translateY(-1px)}
.brst{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:7px 12px;border-radius:8px;font-weight:700;font-size:10px;cursor:pointer;transition:.15s;backdrop-filter:blur(4px)}
.brst:hover{background:rgba(255,255,255,0.25)}
.bprt{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:7px 12px;border-radius:8px;font-weight:700;font-size:10px;cursor:pointer;transition:.15s;backdrop-filter:blur(4px)}
.bprt:hover{background:rgba(255,255,255,0.25)}
.bhst{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:7px 12px;border-radius:8px;font-weight:700;font-size:10px;cursor:pointer;transition:.15s;backdrop-filter:blur(4px)}
.bhst:hover{background:rgba(255,255,255,0.25)}
/* ── History Modal ── */
.hist-modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px}
.hist-box{background:#fff;border-radius:16px;width:100%;max-width:960px;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,0.35)}
.hist-head{padding:16px 20px;background:linear-gradient(135deg,#1e3a8a,#4f46e5);border-radius:16px 16px 0 0;display:flex;align-items:center;justify-content:space-between;color:#fff;flex-shrink:0}
.hist-head .ttl{font-size:14px;font-weight:800}
.hist-head .sub{font-size:10px;opacity:.7;margin-top:3px}
.hist-close{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;border-radius:8px;padding:6px 14px;cursor:pointer;font-size:11px;font-weight:700}
.hist-close:hover{background:rgba(255,255,255,0.25)}
.hist-body{overflow:auto;padding:16px;flex:1}
.hist-tbl{border-collapse:collapse;font-size:11px;white-space:nowrap;width:100%}
.hist-tbl th{background:#f8fafc;color:#374151;padding:7px 10px;border:1px solid #e5e7eb;font-size:10px;font-weight:700;text-align:right}
.hist-tbl th:first-child,.hist-tbl th:nth-child(2){text-align:center}
.hist-tbl td{border:1px solid #e5e7eb;padding:5px 10px;text-align:right}
.hist-tbl td:first-child{text-align:left;color:#6b7280;font-size:10px;background:#f8fafc;font-weight:600;white-space:nowrap}
.hist-tbl td.hm{background:#f0fdf4;color:#166534;font-weight:700;text-align:center}
.hist-tbl tr:hover td{background:#f0f9ff!important}

/* ── Info Bar ── */
.ibar{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:6px 12px;font-size:10px;color:#6b7280;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.ibar-toggle{cursor:pointer;font-weight:700;color:#4f46e5;user-select:none;white-space:nowrap}
.ibar-toggle:hover{color:#4338ca}
.ibar code{font-size:9px;background:#f3f4f6;padding:2px 6px;border-radius:4px;color:#374151}

/* ── Section Cards ── */
.scard{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);margin-bottom:14px;overflow:hidden}
.scard-header{padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:#fff}
.scard-header.c-slate{background:linear-gradient(90deg,#475569,#64748b)}
.scard-header.c-blue{background:linear-gradient(90deg,#2563eb,#4f46e5)}
.scard-header.c-indigo{background:linear-gradient(90deg,#4f46e5,#7c3aed)}
.scard-header.c-green{background:linear-gradient(90deg,#059669,#10b981)}
.scard-header.c-orange{background:linear-gradient(90deg,#ea580c,#f59e0b)}
.scard-body{overflow-x:auto}
.scard-pad{padding:12px 16px}

/* ── Params ── */
.prms{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px}
.pi{display:flex;align-items:center;gap:5px;border:1.5px solid #e5e7eb;border-radius:10px;padding:6px 12px;background:#fafafa;transition:border-color .15s,box-shadow .15s}
.pi:hover{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,0.08)}
.pi label{color:#6b7280;font-size:10px;font-weight:600;white-space:nowrap}
.pi input{width:55px;border:none;outline:none;text-align:right;font-size:12px;font-weight:800;color:#1e3a8a;background:transparent}

/* ── Tables ── */
table{border-collapse:collapse;font-size:11px;white-space:nowrap;width:100%}
th{background:#f8fafc;color:#374151;padding:7px 10px;text-align:center;border:1px solid #e5e7eb;font-size:10px;font-weight:700}
th.grn{background:#dcfce7;color:#14532d}th.orn{background:#fff7ed;color:#9a3412}
td{border:1px solid #e5e7eb;padding:4px 8px}
td.lb{background:#f8fafc;font-weight:700;min-width:140px;color:#374151}
td.lb2{background:#f8fafc;font-weight:600;min-width:70px;color:#6b7280}
td.nw{background:#f0fdf4}td.ov{background:#fff7ed;color:#9a3412;text-align:right;min-width:62px}
td.dp{background:#dcfce7;color:#166534;font-weight:700;text-align:right}
td.dn{background:#fef2f2;color:#dc2626;font-weight:700;text-align:right}
td.t1{background:#dbeafe;font-weight:700;text-align:right}td.t2{background:#bfdbfe;font-weight:700;text-align:right}
td.t3{background:#93c5fd;font-weight:700;text-align:right;color:#1e3a8a}td.g1{background:#dcfce7;font-weight:700;text-align:right}
td.g2{background:#bbf7d0;font-weight:700;text-align:right;color:#14532d}td.yl{background:#fefce8}
td.pp{background:#f5f3ff;text-align:right;color:#5b21b6}td.r1{background:#fef2f2;text-align:right;color:#dc2626}
td.o1{background:#fff7ed;text-align:right;font-weight:700;color:#c2410c}
input.cell{width:100%;text-align:right;border:1.5px solid transparent;outline:none;background:transparent;padding:3px 6px;font-size:11px;font-weight:600;color:#374151;border-radius:6px;transition:all .15s;cursor:pointer}
td.yl input.cell{color:#92400e}
input.cell:hover{border-color:#d1d5db;background:rgba(255,255,255,0.6);cursor:text}
input.cell:focus{background:#fff;border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,0.15);border-radius:6px;color:#1e1b4b;font-weight:700;cursor:text}
tbody tr:hover td{filter:brightness(0.97)}

/* ── KPI Cards ── */
.kpis{display:flex;flex-wrap:wrap;gap:10px}
.kpi{border-radius:12px;padding:12px 16px;min-width:120px;flex:1;min-width:130px;max-width:200px;position:relative;overflow:hidden}
.kpi::after{content:'';position:absolute;top:-20px;right:-20px;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.1)}
.kpi-0{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}
.kpi-1{background:linear-gradient(135deg,#0ea5e9,#0284c7);color:#fff}
.kpi-2{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.kpi-3{background:linear-gradient(135deg,#f59e0b,#ea580c);color:#fff}
.kpi-4{background:linear-gradient(135deg,#ec4899,#db2777);color:#fff}
.kpi-5{background:linear-gradient(135deg,#14b8a6,#0d9488);color:#fff}
.kpi-6{background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:#fff}
.kpi-7{background:linear-gradient(135deg,#3b82f6,#4f46e5);color:#fff}
.kl{font-size:9px;opacity:.75;text-transform:uppercase;letter-spacing:1.2px;font-weight:700}
.kv{font-size:18px;font-weight:800;margin-top:4px;letter-spacing:.5px}

/* ── Summary Tab ── */
.sum-topbar{background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:14px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;box-shadow:0 6px 24px rgba(124,58,237,0.25);color:#fff}
.sum-topbar .ttl{font-size:15px;font-weight:800}
.sum-topbar .sub{font-size:11px;opacity:.7;margin-top:3px}
.sum-table{width:100%;border-collapse:collapse;font-size:11px;background:#fff}
.sum-table th{background:#f8fafc;color:#374151;padding:8px 12px;text-align:center;font-size:10px;font-weight:700;border:1px solid #e5e7eb}
.sum-table th.lft{text-align:left}
.sum-table td{border:1px solid #e5e7eb;padding:6px 12px;white-space:nowrap}
.sum-table tbody tr:hover td{background:#f0f9ff!important}
.sum-table td.pn{background:#f8fafc;font-weight:800;color:#1e3a8a}
.sum-table td.nr{text-align:right}
.sum-table td.hi{background:#dcfce7;font-weight:700;color:#14532d;text-align:right}
.sum-table td.lo{background:#fef2f2;color:#dc2626;text-align:right;font-weight:700}
.sum-note{font-size:10px;color:#9ca3af;margin-top:10px;font-style:italic}

/* ── Footer ── */
.pg-footer{text-align:center;color:#9ca3af;font-size:10px;padding:16px 0 8px;border-top:1px solid #e5e7eb;margin-top:8px}
.pg-footer span{display:inline-block;background:#fff;border:1px solid #e5e7eb;border-radius:999px;padding:3px 12px;font-weight:600}

/* ── Toast ── */
#toast{position:fixed;bottom:20px;right:20px;z-index:999;padding:10px 18px;border-radius:10px;color:#fff;font-size:12px;font-weight:700;display:none;max-width:320px;box-shadow:0 8px 24px rgba(0,0,0,0.15);backdrop-filter:blur(8px)}

/* ── Print ── */
@media print{
  .tab-bar,.bsv,.bexp,.brst,.bprt,.ibar,.uns{display:none!important}
  body{background:#fff;font-size:10px}
  .tp{display:block!important}.tp:not(.act){display:none!important}
  .scard{box-shadow:none;border:1px solid #e5e7eb}
  .topbar{background:#1e3a8a!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .scard-header{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  tr{page-break-inside:avoid}
  @page{margin:1cm;size:A4 landscape}
}
@media(max-width:640px){
  .topbar{flex-direction:column;align-items:flex-start}
  .tbr{width:100%;flex-wrap:wrap}
  #toast{bottom:12px;right:12px;left:12px;max-width:100%}
  .kpi{min-width:calc(50% - 5px);max-width:none}
}

/* ══ TRACKING SYSTEM STYLES ══ */
.form-card{background:#fff;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06);padding:20px;margin-bottom:14px}
.form-title{font-size:13px;font-weight:800;color:#1e3a8a;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.form-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:150px}
.form-group label{font-size:10px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.8px}
.form-group input,.form-group select,.form-group textarea{border:1.5px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:600;color:#374151;outline:none;transition:border-color .15s,box-shadow .15s;background:#fff;font-family:inherit}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,0.12)}
.size-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:4px}
.size-cell{display:flex;flex-direction:column;gap:3px}
.size-cell label{font-size:9px;font-weight:700;color:#6b7280;text-align:center;text-transform:uppercase;letter-spacing:.5px}
.size-cell input{border:1.5px solid #e5e7eb;border-radius:8px;padding:7px 6px;font-size:12px;font-weight:700;color:#1e3a8a;text-align:center;outline:none;width:100%;transition:.15s;font-family:inherit}
.size-cell input:focus{border-color:#4f46e5;box-shadow:0 0 0 2px rgba(79,70,229,0.12)}
.btn-primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;padding:9px 22px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;box-shadow:0 2px 8px rgba(79,70,229,0.3);transition:.15s;font-family:inherit}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,0.4)}
.btn-outline{background:#fff;color:#4f46e5;border:1.5px solid #4f46e5;padding:7px 16px;border-radius:8px;font-weight:700;font-size:11px;cursor:pointer;transition:.15s;font-family:inherit}
.btn-outline:hover{background:#f5f3ff}
.status-badge{display:inline-block;font-size:9px;font-weight:700;padding:3px 10px;border-radius:999px;text-transform:uppercase;letter-spacing:.5px}
.status-pending{background:#fef3c7;color:#92400e}
.status-quoted{background:#dbeafe;color:#1e40af}
.status-confirmed{background:#d1fae5;color:#065f46}
.status-inprod{background:#ede9fe;color:#4c1d95}
.status-completed{background:#dcfce7;color:#14532d}
.req-table{width:100%;border-collapse:collapse;font-size:11px}
.req-table th{background:#f8fafc;color:#374151;padding:8px 12px;text-align:left;border-bottom:2px solid #e5e7eb;font-size:10px;font-weight:700;white-space:nowrap}
.req-table td{padding:8px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle;white-space:nowrap}
.req-table tbody tr:hover td{background:#f8fafc}
.req-table td.id-cell{font-family:monospace;font-weight:800;color:#4f46e5;font-size:12px}
.grand-total-box{background:linear-gradient(135deg,#1e3a8a,#4f46e5);color:#fff;border-radius:10px;padding:8px 18px;display:inline-flex;align-items:center;gap:14px}
.grand-total-box .gt-label{font-size:10px;opacity:.7;text-transform:uppercase;letter-spacing:1px}
.grand-total-box .gt-value{font-size:20px;font-weight:800}
.req-topbar{border-radius:14px;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;color:#fff}
.req-topbar .ttl{font-size:15px;font-weight:800}
.req-topbar .sub{font-size:11px;opacity:.65;margin-top:3px}
.timeline{padding:4px 0}
.tl-item{display:flex;gap:14px;padding-bottom:22px;position:relative}
.tl-item:not(:last-child)::after{content:'';position:absolute;left:18px;top:38px;width:2px;bottom:0;background:#e5e7eb}
.tl-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;position:relative;z-index:1}
.tl-dot.done{background:linear-gradient(135deg,#10b981,#059669);box-shadow:0 2px 8px rgba(16,185,129,0.3)}
.tl-dot.active{background:linear-gradient(135deg,#4f46e5,#7c3aed);box-shadow:0 2px 8px rgba(79,70,229,0.3);animation:pl 2s infinite}
.tl-dot.pending{background:#f3f4f6;border:2px solid #d1d5db}
.tl-content{flex:1;padding-top:7px}
.tl-title{font-size:12px;font-weight:800;color:#374151}
.tl-meta{font-size:10px;color:#9ca3af;margin-top:3px}
.tl-detail{background:#f8fafc;border:1px solid #e5e7eb;border-radius:10px;padding:10px 14px;margin-top:8px;font-size:11px}
.tl-detail table{width:auto}.tl-detail td{padding:3px 10px 3px 0;border:none;font-size:11px;background:transparent}
.tl-detail td:first-child{color:#6b7280;font-weight:600;min-width:90px}
.search-box{display:flex;gap:10px;align-items:center}
.search-box input{flex:1;border:2px solid #e5e7eb;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600;outline:none;transition:.15s;color:#374151;font-family:inherit}
.search-box input:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,0.12)}
.btn-search{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;border:none;padding:11px 24px;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;font-family:inherit;white-space:nowrap}
.sizes-pill-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.sz-pill{background:#dbeafe;color:#1e40af;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:700}
.sz-pill.total{background:#1e3a8a;color:#fff}
.sz-entry-table{width:100%;border-collapse:collapse;font-size:11px;min-width:600px}
.sz-entry-table th{background:#e0e7ff;color:#3730a3;padding:6px 10px;text-align:center;font-size:10px;font-weight:800;border:1px solid #c7d2fe;white-space:nowrap}
.sz-entry-table th.tot-hdr{background:#1e3a8a;color:#fff}
.sz-entry-table td{border:1px solid #e5e7eb;padding:5px 8px;text-align:center;vertical-align:middle}
.sz-entry-table .row-lbl{background:#f8fafc;font-size:9px;font-weight:800;color:#374151;text-align:left;padding:5px 10px;white-space:nowrap;text-transform:uppercase;letter-spacing:.5px;border-right:2px solid #e0e7ff}
.sz-entry-table .ord-cell{background:#eff6ff;color:#1d4ed8;font-weight:800;font-size:12px}
.sz-entry-table .ord-cell.tot-col{background:#1e3a8a;color:#fff}

<body>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<div id="toast"></div>
<div class="tab-bar">
  <div class="tab-brand">
    <div class="tab-brand-icon">MPH</div>
  </div>
  <span class="nav-group-label">Costing</span>
  <button class="tb" onclick="sw('__designs',this)">🎨 Designs</button>
  <button class="tb tb-sum" onclick="sw('__summary',this)">▦ Summary</button>
  <div class="tab-divider"></div>
  <span class="nav-group-label">Production</span>
  <button class="tb" onclick="sw('__dashboard',this)">📊 Dashboard</button>
  <button class="tb" onclick="sw('__req',this)">📋 Requirements</button>
  <button class="tb" onclick="sw('__quote',this)">💰 Quotes</button>
  <button class="tb" onclick="sw('__process',this)">⚙ Process</button>
</div>
<script>
const WRITE_URL   = "https://n8n.wowflo.io/webhook/costing-save";
const READ_URL    = "https://n8n.wowflo.io/webhook/costing-load";
const LIST_URL    = "https://n8n.wowflo.io/webhook/costing-list-all";
const HISTORY_URL = "https://n8n.wowflo.io/webhook/costing-history-load";
const MN = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const now = new Date();
const CUR = MN[now.getMonth()]+" "+String(now.getFullYear()).slice(2);

function slugify(name){ return (name||'').toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,''); }
function deepCopy(o){ return JSON.parse(JSON.stringify(o)); }

const ST = {};
const DIRTY = {};
const LAST_SAVED = {};

/* ── Helpers ── */
const avg = a => a.length ? a.reduce((s,v)=>s+v,0)/a.length : 0;
const f   = (n,d=2) => (+n||0).toFixed(d);
const ce  = (t,c,x) => { const e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; };
const inp = (val,cb) => {
  const i=document.createElement("input"); i.type="number"; i.className="cell"; i.value=val;
  i.addEventListener("focus",e=>{ i.dataset.prev=i.value; i.value=""; });
  i.addEventListener("blur",e=>{ if(i.value==="") i.value=i.dataset.prev||0; });
  i.addEventListener("change",e=>{ cb(parseFloat(e.target.value)||0); });
  return i;
};
function toast(msg,type="success"){
  const t=document.getElementById("toast");
  t.style.background=type==="success"?"linear-gradient(135deg,#10b981,#059669)":type==="warn"?"linear-gradient(135deg,#f59e0b,#ea580c)":"linear-gradient(135deg,#ef4444,#dc2626)";
  t.textContent=msg; t.style.display="block";
  setTimeout(()=>t.style.display="none",4000);
}
function setBadge(id,st,lbl){ const b=document.getElementById(id+"-badge"); if(b){b.className="badge "+st; b.textContent=lbl;} }
const _autoSaveTimers = {};
function markDirty(id){
  DIRTY[id]=true;
  const u=document.getElementById(id+"-uns");
  const s=document.getElementById(id+"-save");
  if(u)u.style.display="";
  if(s)s.disabled=false;
  // Auto-save 1.5s after last change
  setBadge(id,"loading","⟳ Auto-saving…");
  if(_autoSaveTimers[id]) clearTimeout(_autoSaveTimers[id]);
  _autoSaveTimers[id] = setTimeout(()=>{ if(DIRTY[id]) save(id); }, 1500);
}

/* ══ CALC ══ */
function calc(P){
  const tn=P.rawMats.reduce((s,r)=>s+r.nw,0), to=P.rawMats.reduce((s,r)=>s+r.old,0);
  const ln=tn*P.lossPct/100, lo=to*P.lossPct/100;
  const rm={tn,to,ln,lo,t100n:tn+ln,t100o:to+lo,pkn:(tn+ln)/100,pko:(to+lo)/100};
  const sc=P.sizes.map((_,i)=>{
    const g=P.cons[i]||0, fn=rm.pkn/1000*g, fo=rm.pko/1000*g;
    const tt=P.trims.reduce((s,t)=>s+(t.costs[i]||0),0);
    const tot=fn+P.cmt+tt+P.freight, rej=tot*P.rejPct/100, tpc=tot+rej, pr=tpc*P.profitPct/100;
    return {fn,fo,tt,tot,rej,tpc,pr,sr:parseFloat((tpc+pr).toFixed(2))};
  });
  const mc=P.sizes.map((_,i)=>{
    const mrp=P.mrps[i]||0, wsp=mrp*(1-P.tradePct/100), sch=wsp*P.schemePct/100, net=wsp-sch;
    const sup=sc[i].sr, profit=net-P.whExp-sup;
    return {mrp,wsp,sch,net,sup,markup:sup?(profit/(P.whExp+sup))*100:0,markdn:net?(profit/net)*100:0};
  });
  return {rm,sc,mc};
}

/* ══ RENDER ══ */
function th(txt,cls,cs){ const t=ce("th",cls||"",txt); if(cs>1)t.colSpan=cs; return t; }
function td(txt,cls,cs){ const t=ce("td",cls||""); t.textContent=(typeof txt==="number"?f(txt):txt||""); if(cs>1)t.colSpan=cs; return t; }
function nt(v,d,cls){ const t=ce("td",cls||""); t.textContent=f(v,d); t.style.textAlign="right"; return t; }
function row(...c){ const r=document.createElement("tr"); c.forEach(x=>r.appendChild(x)); return r; }

function render(id){
  const P=ST[id]; const {rm,sc,mc}=calc(P); const n=P.sizes.length;

  const ln=document.getElementById(id+"-lnew"), lo2=document.getElementById(id+"-lold"), ls=document.getElementById(id+"-lsaved");
  if(ln) ln.textContent=P.newMonth;
  if(lo2) lo2.textContent=P.oldMonth||"—";
  if(ls && P.savedAt) ls.textContent="· Saved "+new Date(P.savedAt).toLocaleString();

  const pb=document.getElementById(id+"-params"); if(!pb) return;
  pb.innerHTML="";
  [["Loss %","lossPct"],["Rejection %","rejPct"],["Profit %","profitPct"],["CMT ₹","cmt"],
   ["Freight ₹","freight"],["Trade %","tradePct"],["Margin %","marginPct"],["Scheme %","schemePct"],["WH Exp ₹","whExp"]
  ].forEach(([lbl,key])=>{
    const w=ce("div","pi"), l=ce("label"); l.textContent=lbl;
    const i=inp(P[key],v=>{ P[key]=v; markDirty(id); render(id); });
    w.append(l,i); pb.appendChild(w);
  });

  // RAW MATERIAL TABLE
  const rt=document.getElementById(id+"-raw"); rt.innerHTML="";
  const rh=document.createElement("thead"), rr=document.createElement("tr");
  rr.append(th("CATEGORY","",2),th("SPEC"),th("NEW ("+P.newMonth+")","grn"),th("OLD ("+(P.oldMonth||"prev")+")","orn"),th("DIFF"),th("AVG"));
  rh.appendChild(rr); rt.appendChild(rh);
  const rb=document.createElement("tbody");
  P.rawMats.forEach((r,i)=>{
    const tr2=document.createElement("tr");
    tr2.append(td(r.cat,"lb",2), td(r.spec||"",""));
    const tnw=ce("td","nw"); tnw.appendChild(inp(r.nw,v=>{ P.rawMats[i].old=P.rawMats[i].nw; P.rawMats[i].nw=v; markDirty(id); render(id); })); tr2.appendChild(tnw);
    tr2.append(td(f(r.old,0),"ov"));
    const dv=r.nw-r.old; tr2.append(nt(dv,2,dv>=0?"dp":"dn"), nt((r.nw+r.old)/2,2,""));
    rb.appendChild(tr2);
  });
  [["TOTAL",rm.tn,rm.to,"t1",2],["LOSS ("+P.lossPct+"%)",rm.ln,rm.lo,"yl",2],
   ["TOTAL / 100 KG",rm.t100n,rm.t100o,"t2",2],["PER 1 KG",rm.pkn,rm.pko,"g1",4]
  ].forEach(([lbl,nv,ov,cls,dp])=>{
    const dv=nv-ov;
    rb.appendChild(row(td(lbl,"lb",3), nt(nv,dp,cls+" nw"), nt(ov,dp,cls+" ov"), nt(dv,dp,dv>=0?"dp":"dn"), nt((nv+ov)/2,dp,cls)));
  });
  rt.appendChild(rb);

  // SIZE TABLE
  const st=document.getElementById(id+"-size"); st.innerHTML="";
  const sh=document.createElement("thead"), sr=document.createElement("tr");
  sr.append(th("ITEM","",2)); P.sizes.forEach(s=>sr.append(th(s))); sr.append(th("AVG"));
  sh.appendChild(sr); st.appendChild(sh);
  const sb=document.createElement("tbody");
  const cr=document.createElement("tr"); cr.append(td("CONSUMPTION (GRAMS)","lb",2));
  P.cons.forEach((c,i)=>{ const td2=ce("td","yl"); td2.appendChild(inp(c,v=>{ P.cons[i]=v; markDirty(id); render(id); })); cr.appendChild(td2); });
  cr.append(nt(avg(P.cons),2,"")); sb.appendChild(cr);
  [["FABRIC NEW ("+P.newMonth+")",sc.map(x=>x.fn),"nw"],
   ["FABRIC OLD ("+(P.oldMonth||"prev")+")",sc.map(x=>x.fo),"ov"],
   ["DIFFERENCE",sc.map(x=>x.fn-x.fo),""]
  ].forEach(([lbl,vals,cls])=>{
    const r2=document.createElement("tr"); r2.append(td(lbl,"lb",2));
    vals.forEach(v=>r2.appendChild(nt(v,2,cls))); r2.appendChild(nt(avg(vals),2,"t1")); sb.appendChild(r2);
  });
  const cr2=document.createElement("tr"); cr2.append(td("CMT","lb",2));
  P.sizes.forEach(()=>cr2.appendChild(nt(P.cmt,2,"pp"))); cr2.appendChild(nt(P.cmt,2,"pp")); sb.appendChild(cr2);
  const tsh=document.createElement("tr"), tshd=ce("td");
  tshd.colSpan=n+2; tshd.textContent="TRIMS (1 PC)";
  tshd.style.cssText="background:linear-gradient(90deg,#374151,#4b5563);color:#fff;font-weight:800;padding:5px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1px";
  tsh.appendChild(tshd); sb.appendChild(tsh);
  P.trims.forEach((t,ti)=>{
    const r2=document.createElement("tr"); r2.append(td(t.name,"lb"), td(t.desc||"","lb2"));
    t.costs.forEach((c,ci)=>{ const td2=ce("td","yl"); td2.appendChild(inp(c,v=>{ P.trims[ti].costs[ci]=v; markDirty(id); render(id); })); r2.appendChild(td2); });
    r2.appendChild(nt(avg(t.costs),2,"")); sb.appendChild(r2);
  });
  [["TRIMS TOTAL",sc.map(x=>x.tt),"t1"],["FREIGHT",P.sizes.map(()=>P.freight),""],["TOTAL",sc.map(x=>x.tot),"t2"]
  ].forEach(([lbl,vals,cls])=>{
    const r2=document.createElement("tr"); r2.append(td(lbl,"lb",2));
    vals.forEach(v=>r2.appendChild(nt(v,2,cls))); r2.appendChild(nt(avg(vals),2,cls+" t3")); sb.appendChild(r2);
  });
  const rjr=document.createElement("tr"); rjr.append(td("REJECTION","lb"),td(P.rejPct+"%","lb2"));
  sc.forEach(x=>rjr.appendChild(nt(x.rej,2,"r1"))); rjr.appendChild(nt(avg(sc.map(x=>x.rej)),2,"r1")); sb.appendChild(rjr);
  const tr3=document.createElement("tr"); tr3.append(td("TOTAL (1 PC)","lb",2));
  sc.forEach(x=>tr3.appendChild(nt(x.tpc,2,"t3"))); tr3.appendChild(nt(avg(sc.map(x=>x.tpc)),2,"t3")); sb.appendChild(tr3);
  const prr=document.createElement("tr"); prr.append(td("PROFIT","lb"),td(P.profitPct+"%","lb2"));
  sc.forEach(x=>prr.appendChild(nt(x.pr,2,"g1"))); prr.appendChild(nt(avg(sc.map(x=>x.pr)),2,"g1")); sb.appendChild(prr);
  const srr=document.createElement("tr"); srr.append(td("SUPPLIER RATE","lb",2));
  sc.forEach(x=>srr.appendChild(nt(x.sr,2,"g2"))); srr.appendChild(nt(avg(sc.map(x=>x.sr)),2,"g2")); sb.appendChild(srr);
  st.appendChild(sb);

  // MRP TABLE
  const mt=document.getElementById(id+"-mrp"); mt.innerHTML="";
  const mh=document.createElement("thead"), mr=document.createElement("tr");
  mr.append(th("ITEM")); P.sizes.forEach(s=>mr.append(th(s))); mr.append(th("AVG"));
  mh.appendChild(mr); mt.appendChild(mh);
  const mb=document.createElement("tbody");
  const mrpR=document.createElement("tr"); mrpR.append(td("MRP","lb"));
  P.mrps.forEach((m,i)=>{ const td2=ce("td","yl"); td2.appendChild(inp(m,v=>{ P.mrps[i]=v; markDirty(id); render(id); })); mrpR.appendChild(td2); });
  mrpR.appendChild(nt(avg(P.mrps),2,"")); mb.appendChild(mrpR);
  [["WSP",mc.map(m=>m.wsp),"t1"],["Scheme "+P.schemePct+"%",mc.map(m=>m.sch),""],
   ["Net WSP",mc.map(m=>m.net),"g1"],["WH Exp",P.sizes.map(()=>P.whExp),""],
   ["Supplier Rate",sc.map(x=>x.sr),"t1"],["MARK UP %",mc.map(m=>m.markup),"g1"],["MARK DOWN %",mc.map(m=>m.markdn),"o1"]
  ].forEach(([lbl,vals,cls])=>{
    const r2=document.createElement("tr"); r2.append(td(lbl,"lb"));

/* ══ SAVE ══ */
async function save(id){
  const P=ST[id]; const btn=document.getElementById(id+"-save"); if(btn) btn.disabled=true;
  const monthChanged = P.newMonth !== CUR;
  const baseline = LAST_SAVED[id] || P.rawMats;
  const payload={
    ...P,
    rawMats: P.rawMats.map((r,i)=>({...r, old: baseline[i]!==undefined ? baseline[i].nw : r.old})),
    oldMonth: CUR,
    newMonth: CUR, savedAt: new Date().toISOString()
  };
  setBadge(id,"loading","⟳ Saving…");
  try{
    const res=await fetch(WRITE_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    if(!res.ok) throw new Error("HTTP "+res.status);
    Object.assign(ST[id], payload);
    LAST_SAVED[id] = payload.rawMats.map(r=>({...r}));
    DIRTY[id]=false;
    const u=document.getElementById(id+"-uns"); if(u) u.style.display="none";
    setBadge(id,"connected","✓ Supabase Live");
    toast(monthChanged?"✓ Saved! OLD ← "+payload.oldMonth:"✓ Saved "+CUR);
  }catch(e){
    Object.assign(ST[id], payload);
    LAST_SAVED[id] = payload.rawMats.map(r=>({...r}));
    DIRTY[id]=false;
    const u=document.getElementById(id+"-uns"); if(u) u.style.display="none";
    setBadge(id,"local","◆ Local Only");
    toast("⚠ Local only — "+e.message,"warn");
  }
  render(id);
}

/* ══ LOAD ══ */
async function load(id){
  setBadge(id,"loading","⟳ Fetching…");
  const productName=ST[id].name;
  try{
    const res=await fetch(READ_URL+"?product="+encodeURIComponent(productName));
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    if(data?.rawMats?.length){
      Object.assign(ST[id], data);
      LAST_SAVED[id] = data.rawMats.map(r=>({...r}));
      setBadge(id,"connected","✓ Supabase Live");
      toast("✓ "+productName+" loaded");
    } else throw new Error("No DB record for "+productName);
  }catch(e){
    setBadge(id,"local","◆ Defaults");
    toast("ℹ Using defaults — save to sync","warn");
  }
  render(id);
  const btn=document.getElementById(id+"-save"); if(btn) btn.disabled=false;
}

let REQS=[], QUOTES=[], PROD_LOGS=[], _reqSeq=0;

async function _loadTrackingFromDB(){
  try{
    const [reqRes,quoteRes,logRes]=await Promise.all([
      fetch(REQ_LOAD_URL).then(r=>r.json()),
      fetch(QUOTE_LOAD_URL).then(r=>r.json()),
      fetch(LOG_LOAD_URL).then(r=>r.json())
    ]);
    if(reqRes.reqs && reqRes.reqs.length>0){ REQS=reqRes.reqs; _reqSeq=REQS.length; }
    if(quoteRes.quotes && quoteRes.quotes.length>0) QUOTES=quoteRes.quotes;
    if(logRes.logs && logRes.logs.length>0) PROD_LOGS=logRes.logs;
    _dbLoaded=true;
    console.log('DB loaded: '+REQS.length+' reqs, '+QUOTES.length+' quotes, '+PROD_LOGS.length+' logs');
  }catch(e){

function genReqId(){
  const d=new Date();
  const yymm=String(d.getFullYear()).slice(2)+String(d.getMonth()+1).padStart(2,'0');
  let seq=++_reqSeq;
  let id='REQ-'+yymm+'-'+String(seq).padStart(3,'0');
  while(REQS.find(r=>r.id===id)){seq++;id='REQ-'+yymm+'-'+String(seq).padStart(3,'0');}
  return id;
}
function getReqStatus(req){
  const logs=PROD_LOGS.filter(l=>l.reqId===req.id);
  const q=QUOTES.find(q=>q.reqId===req.id);
  if(logs.find(l=>l.stage==='dispatched')) return 'completed';
  if(logs.length>0) return 'inprod';
  if(q) return 'confirmed';
  return req.status||'pending';
}
function statusBadge(status){
  const map={pending:'status-pending',quoted:'status-quoted',confirmed:'status-confirmed',inprod:'status-inprod',completed:'status-completed'};
  const labels={pending:'Pending',quoted:'Quoted',confirmed:'Confirmed',inprod:'In Production',completed:'Completed'};
  return `<span class="status-badge ${map[status]||'status-pending'}">${labels[status]||status}</span>`;
}

function _dashTable(reqs){
  if(!reqs.length) return `<div style="padding:40px;text-align:center;color:#94a3b8"><div style="font-size:32px;margin-bottom:10px">🔍</div><div style="font-weight:700">No orders match your filter</div></div>`;

  reqs.forEach(r=>{
    const st=getReqStatus(r);
    const tot=Object.values(r.sizes||{}).reduce((a,b)=>a+b,0);
    const overdue=r.requiredBy&&new Date(r.requiredBy)<new Date()&&st!=='completed';
    h+=`<tr>
      <td class="id-cell">${r.id}</td>
      <td><b>${r.style}</b></td>
      <td style="color:#6b7280">${r.category||'—'}</td>

      <td style="font-size:11px;${overdue?'color:#dc2626;font-weight:700':''}">${r.requiredBy||'—'}${overdue?' ⚠':''}</td>

function _applyDashFilter(reqs){
  return reqs.filter(r=>{
    const st=getReqStatus(r);
    const statusOk=_dashFilter.status==='all'
      ||(_dashFilter.status==='confirmed'&&(st==='confirmed'||st==='quoted'))
      ||st===_dashFilter.status;
    const q=_dashFilter.search.toLowerCase();
    const searchOk=!q||r.id.toLowerCase().includes(q)||(r.style||'').toLowerCase().includes(q)||(r.category||'').toLowerCase().includes(q);
    return statusOk&&searchOk;
  });
}

/* ── EXCEL UPLOAD ── */
const REQ_EXCEL_COLS = ['Style','Required By','Submitted By','Notes',...ALL_SIZES];

function downloadReqTemplate(){
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([REQ_EXCEL_COLS]);
  // sample row
  XLSX.utils.sheet_add_aoa(ws,[['BREEZO',new Date(Date.now()+7*86400000).toISOString().slice(0,10),'Ram','','100','200','300','200','100','50','','','','','']],{origin:'A2'});
  ws['!cols'] = REQ_EXCEL_COLS.map(c=>({wch:Math.max(c.length+2,12)}));
  XLSX.utils.book_append_sheet(wb,ws,'Requirements');
  XLSX.writeFile(wb,'requirement_template.xlsx');
  toast('✓ Template downloaded');
}

async function handleReqExcel(e){
  const file = e.target.files[0]; if(!file) return;
  e.target.value='';
  try {
    const ab = await file.arrayBuffer();
    const wb = XLSX.read(ab, {type:'array', cellDates:true});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
    if(!rows.length){ toast('Excel is empty','error'); return; }

    let added=0, skipped=0;
    const saves=[];
    rows.forEach(row=>{
      const style = String(row['Style']||row['STYLE']||'').trim();
      if(!style){ skipped++; return; }
      const sizes={};
      ALL_SIZES.forEach(sz=>{
        const v=parseInt(row[sz]||row[sz.toLowerCase()]||0)||0;
        if(v>0) sizes[sz]=v;
      });
      if(!Object.keys(sizes).length){ skipped++; return; }
      const req={
        id:genReqId(), style, sizes,
        grandTotal:Object.values(sizes).reduce((a,b)=>a+b,0),
        requiredBy: (()=>{const rv=row['Required By']||row['REQUIRED BY']||''; if(!rv) return ''; if(rv instanceof Date) return rv.toISOString().slice(0,10); const d=new Date(rv); return isNaN(d)?String(rv).slice(0,10):d.toISOString().slice(0,10);})(),
        submittedBy: String(row['Submitted By']||row['SUBMITTED BY']||'').trim(),
        notes: String(row['Notes']||row['NOTES']||'').trim(),
        status:'pending', createdAt:new Date().toISOString()
      };
      REQS.push(req);
      saves.push(fetch(REQ_SAVE_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(req)}).catch(()=>{}));
      added++;
    });
    await Promise.all(saves);
    toast(added+' requirement'+(added!==1?'s':'')+' imported'+(skipped?' ('+skipped+' skipped)':''));
    renderRequirements();
  } catch(err) {
    console.error('[req-excel]',err);
    toast('⚠ Failed to parse Excel: '+err.message,'error');
  }
}

          : `<div style="overflow-x:auto"><table class="req-table">
              <thead><tr><th>REQ ID</th><th>Vendor</th><th>Fabric</th><th>Yarn ₹</th><th>Dyeing ₹</th><th>Knitting ₹</th><th>Other ₹</th><th>Total/100Kg ₹</th><th>Confirmed By</th><th>Date</th></tr></thead>
              <tbody>
                ${QUOTES.map(q=>`<tr>
                  <td class="id-cell">${q.reqId}</td>

}
function onQuoteReqChange(){
  const id=document.getElementById('quote-req-sel').value;
  const detail=document.getElementById('quote-req-detail');
  if(!id){detail.style.display='none';return;}
  const req=REQS.find(r=>r.id===id);
  if(!req){detail.style.display='none';return;}
  detail.style.display='';
  const total=Object.values(req.sizes).reduce((a,b)=>a+b,0);
  document.getElementById('quote-req-sizes').innerHTML=`
    <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px 16px">
      <div style="font-size:12px;font-weight:800;color:#065f46;margin-bottom:8px">${req.style} &nbsp;·&nbsp; Required by: <b>${req.requiredBy||'—'}</b></div>
      <div class="sizes-pill-row">
        ${Object.entries(req.sizes).map(([sz,qty])=>`<span class="sz-pill">${sz}: ${qty}</span>`).join('')}
        <span class="sz-pill total">Total: ${total.toLocaleString()} pcs</span>
      </div>
      ${req.notes?`<div style="margin-top:8px;font-size:11px;color:#6b7280">${req.notes}</div>`:''}
    </div>`;
}
function updateQuoteTotal(){
  const total=['q-yarn','q-dye','q-knit','q-bleach','q-compact','q-other'].reduce((s,id)=>s+(parseFloat(document.getElementById(id)?.value)||0),0);
  const box=document.getElementById('q-total-box');
  if(box) box.innerHTML=total>0?`<div class="grand-total-box" style="background:linear-gradient(135deg,#065f46,#059669)"><span class="gt-label">Total Cost / 100 Kg</span><span class="gt-value">₹${total.toLocaleString()}</span></div>`:'';
}
async function submitQuote(){
  const reqId=document.getElementById('quote-req-sel').value;
  const vendorName=(document.getElementById('q-vendor').value||'').trim();
  const fabricType=(document.getElementById('q-fabric').value||'').trim();
  const confirmedBy=(document.getElementById('q-by').value||'').trim();
  if(!reqId||!vendorName||!fabricType||!confirmedBy){toast('Fill all vendor fields','error');return;}
  const yarnCost=parseFloat(document.getElementById('q-yarn').value)||0;
  const dyeCost=parseFloat(document.getElementById('q-dye').value)||0;
  const knitCost=parseFloat(document.getElementById('q-knit').value)||0;
  const bleachCost=parseFloat(document.getElementById('q-bleach').value)||0;
  const compactCost=parseFloat(document.getElementById('q-compact').value)||0;
  const otherCost=parseFloat(document.getElementById('q-other').value)||0;
  const totalCost=yarnCost+dyeCost+knitCost+bleachCost+compactCost+otherCost;
  const quote={reqId,vendorName,fabricType,confirmedBy,yarnCost,dyeCost,knitCost,bleachCost,compactCost,otherCost,totalCost,
    notes:(document.getElementById('q-notes').value||'').trim(),confirmedAt:new Date().toISOString()};
  QUOTES.push(quote);
  const req=REQS.find(r=>r.id===reqId); if(req) req.status='confirmed';
  try{await fetch(QUOTE_SAVE_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(quote)});}catch(e){}
  try{await fetch(REQ_STATUS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({reqId,status:'confirmed'})});}catch(e){}
  toast('✓ Quote submitted for '+reqId);
  renderVendorQuote();
}

/* ── TRACKER TAB ── */
function renderTracker(searchId){
  const wrap=document.getElementById('tab-__track');
  wrap.innerHTML=`
    <div class="req-topbar" style="background:linear-gradient(135deg,#1c1917,#292524);box-shadow:0 6px 24px rgba(0,0,0,0.2)">
      <div>
        <div class="ttl">🔍 Tracker</div>
        <div class="sub">Enter a Requirement ID — see the full journey from yarn to dispatch</div>
      </div>
    </div>
    <div class="form-card">
      <div class="search-box">
        <input type="text" id="track-input" placeholder="Enter REQ ID — e.g. REQ-2603-001" value="${searchId||''}"/>
        <button class="btn-search" onclick="doTrack()">Track</button>
      </div>
      <div id="track-result" style="margin-top:16px"></div>
    </div>`;
  document.getElementById('track-input').addEventListener('keydown',e=>{if(e.key==='Enter')doTrack();});
  if(searchId) doTrackId(searchId);
}
function trackReqId(id){
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('act'));
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('act'));
  document.getElementById('tab-__track').classList.add('act');
  document.querySelectorAll('.tb').forEach(b=>{if(b.textContent.includes('TRACKER'))b.classList.add('act');});
  renderTracker(id);
}
function doTrack(){
  const id=(document.getElementById('track-input')?.value||'').trim().toUpperCase();
  if(!id){toast('Enter a REQ ID','warn');return;}
  doTrackId(id);
}
function doTrackId(id){
  const result=document.getElementById('track-result');
  if(!result) return;
  const req=REQS.find(r=>r.id===id);
  if(!req){
    result.innerHTML=`<div style="text-align:center;padding:32px;color:#9ca3af">
      <div style="font-size:40px;margin-bottom:8px">🔎</div>
      <div style="font-size:13px;font-weight:700">No requirement found for <span style="color:#4f46e5">${id}</span></div>
      <div style="font-size:11px;margin-top:4px">Check the ID or go to the Requirements tab</div>
    </div>`; return;
  }
  const quote=QUOTES.find(q=>q.reqId===id);
  const logs=PROD_LOGS.filter(l=>l.reqId===id).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const status=getReqStatus(req);
  const total=Object.values(req.sizes).reduce((a,b)=>a+b,0);
  const stagesDone=logs.length;
  const lastLog=logs[logs.length-1];
  const lastQty=lastLog?.qty||null;
  const daysSince=req.createdAt?Math.floor((Date.now()-new Date(req.createdAt))/86400000):0;

  // ── STEPPER ──
  const allSteps=[
    {key:'req',    label:'Req Raised', icon:'📋', done:true,  qty:total},
    {key:'quoted', label:'Quoted',     icon:'💰', done:!!quote, qty:null},

      done:!!logs.find(l=>l.stage===s.key),qty:logs.find(l=>l.stage===s.key)?.qty||null}))
  ];
  const firstPendingIdx=allSteps.findIndex(s=>!s.done);

  const stepperHtml=`<div class="stepper">${allSteps.map((s,i)=>{
    const cls=s.done?'s-done':i===firstPendingIdx?'s-active':'s-pending';

      <div class="step-dot ${cls}">${s.done?s.icon:(i===firstPendingIdx?'⟳':'○')}</div>
      <div class="step-label ${cls}">${s.label}</div>
      ${s.qty?`<div class="step-qty">${Number(s.qty).toLocaleString()}</div>`:''}
    </div>`;
  }).join('')}</div>`;

  // ── STAT CARDS ──
  const pct=lastQty?Math.round(lastQty/total*100):null;
  const lossPcs=lastQty?(total-lastQty):null;
  const statHtml=`<div class="stat-grid">
    <div class="stat-card c-blue"><div class="stat-label">Ordered</div><div class="stat-value">${total.toLocaleString()}</div><div class="stat-sub">Total pieces</div></div>
    <div class="stat-card c-purple"><div class="stat-label">Last Logged Qty</div><div class="stat-value">${lastQty?Number(lastQty).toLocaleString():'—'}</div><div class="stat-sub">${pct!==null?pct+'% of order':'No qty logged yet'}</div></div>
    <div class="stat-card c-green"><div class="stat-label">Stages Done</div><div class="stat-value">${stagesDone}<span style="font-size:13px;color:#9ca3af"> / ${PROD_STAGES.length}</span></div><div class="stat-sub">${quote?'Vendor confirmed':'Awaiting quote'}</div></div>
    <div class="stat-card ${lossPcs>50?'c-red':'c-orange'}"><div class="stat-label">Qty Loss</div><div class="stat-value">${lossPcs!==null?lossPcs.toLocaleString():'—'}</div><div class="stat-sub">${lossPcs!==null?Math.round(lossPcs/total*100)+'% loss':'—'}</div></div>
    <div class="stat-card c-blue"><div class="stat-label">Days Running</div><div class="stat-value">${daysSince}</div><div class="stat-sub">Since requirement</div></div>
    <div class="stat-card ${req.requiredBy&&new Date(req.requiredBy)<new Date()&&status!=='completed'?'c-red':'c-green'}"><div class="stat-label">Required By</div><div class="stat-value" style="font-size:14px">${req.requiredBy||'—'}</div><div class="stat-sub">${req.requiredBy?(new Date(req.requiredBy)<new Date()&&status!=='completed'?'⚠ Overdue':'On track'):'Not set'}</div></div>
  </div>`;

  // ── QTY FLOW TABLE ──
  const flowRows=[
    {stage:'Requirement',icon:'📋',qty:total,date:req.createdAt,by:req.submittedBy,notes:'Order placed'},
    quote?{stage:'Vendor Confirmed',icon:'💰',qty:total,date:quote.confirmedAt,by:quote.confirmedBy,notes:'Vendor: '+quote.vendorName+' · ₹'+quote.totalCost.toLocaleString()+'/100Kg'}:null,
    ...logs.map(l=>({stage:PROD_STAGES.find(s=>s.key===l.stage)?.label||l.stage,icon:PROD_STAGES.find(s=>s.key===l.stage)?.icon||'⏳',qty:l.qty,date:l.date,by:l.updatedBy,notes:l.notes}))
  ].filter(Boolean);

  const flowHtml=`<div class="qty-flow-card">
    <div class="qty-flow-hdr">📊 Quantity Flow — Yarn to Dispatch</div>
    <div style="overflow-x:auto"><table class="qty-flow-table">
      <thead><tr><th>#</th><th>Stage</th><th>Qty (pcs)</th><th>vs Order</th><th>Loss</th><th>Logged By</th><th>Date &amp; Time</th><th>Notes</th></tr></thead>
      <tbody>${flowRows.map((r,i)=>{
        const pct=r.qty?Math.min(100,Math.round(r.qty/total*100)):null;
        const loss=r.qty?(total-r.qty):null;
        const lossCls=loss===null?'':loss===0?'loss-ok':loss<total*0.03?'loss-warn':'loss-bad';
        return `<tr>
          <td style="color:#9ca3af;font-size:10px">${i+1}</td>
          <td><span style="margin-right:5px">${r.icon}</span><b>${r.stage}</b></td>
          <td style="text-align:right;font-weight:800;color:#1e3a8a;font-size:12px">${r.qty?Number(r.qty).toLocaleString():'—'}</td>
          <td>${pct!==null?`<span style="font-size:10px;font-weight:700;color:${pct>=97?'#059669':pct>=90?'#d97706':'#dc2626'}">${pct}%</span>
            <span class="qty-bar-wrap"><span class="qty-bar-fill ${pct<90?'danger':pct<97?'warn':''}" style="width:${pct}%"></span></span>`:'—'}</td>
          <td>${loss!==null?`<span class="loss-pill ${lossCls}">${loss===0?'✓ None':'-'+loss.toLocaleString()+' pcs'}</span>`:'—'}</td>
          <td>${r.by||'—'}</td>
          <td style="color:#6b7280">${r.date?new Date(r.date).toLocaleString():'—'}</td>
          <td style="color:#6b7280;max-width:180px;white-space:normal">${r.notes||'—'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;

  result.innerHTML=`
    <div class="tracker-header">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px">
        <div class="tracker-id">${req.id}</div>
        ${statusBadge(status)}
        <button onclick="doTrackId('${id}')" title="Refresh" style="background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;padding:4px 12px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer">↻ Refresh</button>

      <div class="tracker-meta">${req.style} &nbsp;·&nbsp; ${req.category} &nbsp;·&nbsp; ${req.brand||''} &nbsp;·&nbsp; ${req.submittedBy||'—'}</div>

        </div>
      </div>

      <div class="tl-item">
        <div class="tl-dot ${quote?'done':status==='pending'?'active':'pending'}">${quote?'💰':'⏳'}</div>
        <div class="tl-content">
          <div class="tl-title">Vendor Quoted & Confirmed</div>
          <div class="tl-meta">${quote?quote.confirmedBy+' · '+new Date(quote.confirmedAt).toLocaleString():'<span style="color:#f59e0b">Awaiting vendor quote</span>'}</div>

                    <tr>
                      <td class="row-lbl">✏️ Processed</td>
                      ${Object.keys(req.sizes).map(sz=>`<td class="inp-cell"><input type="number" id="${formId}-sz-${sz.replace(/[^a-zA-Z0-9]/g,'_')}" placeholder="0" min="0" oninput="calcStageTotal('${formId}')"/></td>`).join('')}
                      <td class="tot-cell" id="${formId}-sztotal">0</td>
                    </tr>
                    <tr>
                      <td class="row-lbl">± Diff</td>
                      ${Object.keys(req.sizes).map(sz=>`<td class="diff-cell" id="${formId}-diff-${sz.replace(/[^a-zA-Z0-9]/g,'_')}">—</td>`).join('')}
                      <td class="diff-cell" id="${formId}-difftot">—</td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <div style="display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap">
                <button onclick="submitStageLog('${id}','${stage.key}','${stage.label}','${formId}')"
                  style="background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;padding:9px 20px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer">
                  ✓ Submit Log
                </button>
                <button onclick="toggleStageForm('${formId}')"
                  style="background:#fff;border:1.5px solid #e5e7eb;color:#6b7280;padding:9px 16px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:600">
                  Cancel
                </button>
                <span id="${formId}-warn" style="font-size:10px;color:#ef4444;font-weight:700;display:none">⚠ Qty exceeds previous stage — cannot submit</span>
              </div>
            </div>`;})():''}
          </div>
        </div>`;
      }).join('')}
    </div></div></div>`;
}
function toggleStageForm(formId){
  const el=document.getElementById(formId);
  if(!el) return;
  const isHidden=el.style.display==='none';
  el.style.display=isHidden?'block':'none';
  if(isHidden){ const inp=document.getElementById(formId+'-name'); if(inp) inp.focus(); }
}
function calcStageTotal(formId){
  const form=document.getElementById(formId);
  const reqId=form?.dataset?.reqid;
  const req=REQS.find(r=>r.id===reqId);
  if(!req) return;
  const prevKey=form?.dataset?.prevstagekey||'';
  const prevLog=prevKey?PROD_LOGS.filter(l=>l.reqId===reqId).find(l=>l.stage===prevKey):null;
  const limitSizes=prevLog?.sizeQty?Object.fromEntries(Object.keys(req.sizes).map(sz=>[sz,prevLog.sizeQty[sz]||0])):req.sizes;
  const limitTotal=Object.values(limitSizes).reduce((a,b)=>a+b,0);
  let processedTotal=0, hasExcess=false;
  Object.keys(req.sizes).forEach(sz=>{
    const limit=limitSizes[sz]||0;
    const key=sz.replace(/[^a-zA-Z0-9]/g,'_');
    const inp=document.getElementById(formId+'-sz-'+key);
    const processed=parseInt(inp?.value)||0;
    processedTotal+=processed;
    const diff=processed-limit;
    const diffCell=document.getElementById(formId+'-diff-'+key);
    if(diffCell){
      if(!inp?.value){diffCell.textContent='—';diffCell.style.color='#9ca3af';}
      else if(diff===0){diffCell.textContent='✓';diffCell.style.color='#059669';}
      else if(diff<0){diffCell.textContent=diff;diffCell.style.color='#d97706';}
      else{diffCell.textContent='+'+diff;diffCell.style.color='#dc2626';hasExcess=true;}
    }
  });
  const totCell=document.getElementById(formId+'-sztotal');
  if(totCell){
    totCell.textContent=processedTotal.toLocaleString();
    totCell.style.color=processedTotal===limitTotal?'#059669':processedTotal>limitTotal?'#dc2626':'#1e3a8a';
  }
  const diffTot=document.getElementById(formId+'-difftot');
  if(diffTot){
    const d=processedTotal-limitTotal;
    if(processedTotal===0){diffTot.textContent='—';diffTot.style.color='#9ca3af';}
    else if(d===0){diffTot.textContent='✓ Match';diffTot.style.color='#059669';}
    else if(d<0){diffTot.textContent=d+' pcs';diffTot.style.color='#d97706';}
    else{diffTot.textContent='+'+d+' pcs';diffTot.style.color='#dc2626';}
  }
  const warn=document.getElementById(formId+'-warn');
  if(warn) warn.style.display=hasExcess?'inline':'none';
}
function submitStageLog(reqId,stage,stageLabel,formId){
  const updatedBy=(document.getElementById(formId+'-name')?.value||'').trim();
  if(!updatedBy){toast('Enter your name','error');document.getElementById(formId+'-name')?.focus();return;}
  const req=REQS.find(r=>r.id===reqId);
  const sizeQty={};
  let totalQty=0;
  if(req){
    Object.keys(req.sizes).forEach(sz=>{
      const key=sz.replace(/[^a-zA-Z0-9]/g,'_');
      const v=parseInt(document.getElementById(formId+'-sz-'+key)?.value)||0;
      if(v>0){sizeQty[sz]=v;} totalQty+=v;
    });
  }
  if(totalQty===0){toast('Enter at least one size quantity','error');return;}
  const form2=document.getElementById(formId);
  const prevKey2=form2?.dataset?.prevstagekey||'';
  const prevLog2=prevKey2?PROD_LOGS.filter(l=>l.reqId===reqId).find(l=>l.stage===prevKey2):null;
  if(prevLog2?.sizeQty){
    const exceeded=Object.entries(sizeQty).some(([sz,q])=>q>(prevLog2.sizeQty[sz]||0));
    if(exceeded){toast('⚠ Cannot log more than previous stage quantity','error');return;}
  }
  const dtVal=document.getElementById(formId+'-dt')?.value||'';
  const notes=(document.getElementById(formId+'-notes')?.value||'').trim();
  const date=dtVal?new Date(dtVal).toISOString():new Date().toISOString();
  const log={reqId,stage,updatedBy,qty:totalQty,sizeQty,notes,date};
  PROD_LOGS.push(log);
  try{fetch(LOG_SAVE_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(log)});}catch(e){}
  toast('✓ '+stageLabel+' logged — '+totalQty.toLocaleString()+' pcs');
  doTrackId(reqId);
}

const DEFAULT_PROCESSES=[

  {no:11,name:'STITCHING',remarks:'All products'},

  {no:15,name:'DISPATCH',remarks:'All products'}
];

let _procSteps=[...DEFAULT_PROCESSES];

async function loadProcessSteps(){
  try{
    const res=await fetch(PROC_LOAD_URL);
    const data=await res.json();
    if(data.steps && data.steps.length>0){
      _procSteps=data.steps;
    }
  }catch(e){ console.warn('Process load failed, using defaults'); }
}

async function saveProcessSteps(){
  const rows=[];
  document.querySelectorAll('#proc-tbody tr').forEach((tr,i)=>{
    const name=tr.querySelector('.proc-name').value.trim();
    const remarks=tr.querySelector('.proc-remarks').value.trim();
    if(name) rows.push({no:i+1,name,remarks});
  });
  _procSteps=rows;
  try{
    await fetch(PROC_SAVE_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({steps:rows})});
    toast('✓ Process steps saved');
  }catch(e){ toast('⚠ Save failed — stored locally'); }
  renderProcess();
}

function addProcessRow(){
  const n=_procSteps.length+1;
  _procSteps.push({no:n,name:'',remarks:''});
  renderProcess();
  const last=document.querySelector('#proc-tbody tr:last-child .proc-name');
  if(last) last.focus();
}

function removeProcessRow(idx){
  _procSteps.splice(idx,1);
  _procSteps.forEach((p,i)=>p.no=i+1);
  renderProcess();
}

async function renderProcess(){
  const wrap=document.getElementById('tab-__process');
  if(!_procSteps.length || _procSteps===DEFAULT_PROCESSES) await loadProcessSteps();
  const steps=_procSteps;
  let html=`
  <div class="topbar">
    <div class="topbar-left">
      <div class="ttl">⚙ OTTO - INNERWEAR - PROCESS</div>
      <div class="sub">Complete production process flow &bull; <b>${steps.length} Steps</b></div>
    </div>
    <div class="tbr">
      <button class="bsv" onclick="saveProcessSteps()">💾 Save Process</button>
      <button class="bexp" onclick="addProcessRow()">+ Add Step</button>
      <button class="brst" onclick="_procSteps=[...DEFAULT_PROCESSES];renderProcess()">↺ Reset</button>
    </div>
  </div>
  <div class="ibar">
    📥 LOAD: <code>${PROC_LOAD_URL}</code> &nbsp;|&nbsp;
    📤 SAVE: <code>${PROC_SAVE_URL}</code>
  </div>
  <div class="scard">
    <div class="scard-header c-indigo">⚙ PRODUCTION PROCESS FLOW</div>
    <div class="scard-body">
      <table>
        <thead>
          <tr>
            <th style="width:60px">S.NO</th>
            <th style="width:250px">PROCESS</th>
            <th>REMARKS</th>
            <th style="width:50px"></th>
          </tr>
        </thead>
        <tbody id="proc-tbody">`;
  steps.forEach((p,i)=>{
    html+=`<tr>
      <td style="text-align:center;font-weight:700">${p.no}</td>
      <td><input class="cell proc-name" value="${(p.name||'').replace(/"/g,'&quot;')}" placeholder="Process name"></td>
      <td><input class="cell proc-remarks" value="${(p.remarks||'').replace(/"/g,'&quot;')}" placeholder="Remarks"></td>
      <td style="text-align:center"><button onclick="removeProcessRow(${i})" style="background:none;border:none;color:#dc2626;cursor:pointer;font-size:14px" title="Remove">✕</button></td>
    </tr>`;
  });
  html+=`</tbody></table></div></div>`;
  wrap.innerHTML=html;
}

// override sw() to handle new tabs
const _swOrig=sw;
sw=function(id,btn){
  const activate=(tabId,b)=>{
    document.querySelectorAll('.tp').forEach(p=>p.classList.remove('act'));
    document.querySelectorAll('.tb').forEach(x=>x.classList.remove('act'));
    document.getElementById('tab-'+tabId).classList.add('act');
    if(b) b.classList.add('act');
  };
  if(id==='__designs'){activate(id,btn);renderDesigns();return;}
  if(id==='__dashboard'){activate(id,btn);renderDashboard();return;}
  if(id==='__req'){activate(id,btn);renderRequirements();return;}
  if(id==='__quote'){activate(id,btn);renderVendorQuote();return;}
  if(id==='__track'){activate(id,btn);renderTracker();return;}
  if(id==='__process'){activate(id,btn);renderProcess();return;}
  _swOrig(id,btn);
};

async function showHistory(id){
  const P = ST[id];
  document.getElementById('hist-title').textContent = P.name + ' — Change History';
  document.getElementById('hist-sub').textContent = 'Loading…';
  document.getElementById('hist-body').innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af">Loading…</div>';
  document.getElementById('hist-modal').style.display = 'flex';
  try{
    const res = await fetch(HISTORY_URL + '?product=' + encodeURIComponent(P.name));
    const { history } = await res.json();
    if(!history || !history.length){
      document.getElementById('hist-sub').textContent = 'No history yet — save the sheet to start tracking';
      document.getElementById('hist-body').innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af">No saves recorded yet.</div>';
      return;
    }
    document.getElementById('hist-sub').textContent = history.length + ' saves recorded';
    const matLabels = (history[0].data.rawMats||[]).map(r=>r.cat||r.label||r.key||'?');
    let html = '<table class="hist-tbl"><thead><tr>';
    html += '<th style="text-align:left;min-width:130px">Saved At</th><th>Month</th>';
    matLabels.forEach(l=>{ html += `<th>${l} (₹/100kg)</th>`; });
    html += '<th>CMT</th><th>Rej%</th><th>Profit%</th></tr></thead><tbody>';
    history.forEach(h=>{
      const d = h.data || {};
      const dt = new Date(h.saved_at).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'});
      html += `<tr><td>${dt}</td><td class="hm">${d.newMonth||'—'}</td>`;
      (d.rawMats||[]).forEach(r=>{ html += `<td>${f(r.nw)}</td>`; });
      html += `<td>${f(d.cmt)}</td><td>${f(d.rejPct)}</td><td>${f(d.profitPct)}</td>`;
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('hist-body').innerHTML = html;
  }catch(e){
    document.getElementById('hist-body').innerHTML = `<div style="text-align:center;padding:40px;color:#dc2626">Error: ${e.message}</div>`;
  }
}
function closeHistory(){
  document.getElementById('hist-modal').style.display = 'none';
}
